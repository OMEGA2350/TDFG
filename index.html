<!DOCTYPE html>
<html>
<head>
    <title>TDFG</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* NAVBAR */
        .nav {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            box-sizing: border-box;
        }

        .nav .menu {
            display: flex;
            gap: 40px;
            letter-spacing: 3px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
            color: red;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1520975922203-bb4d4a3a0c4c') center/cover no-repeat;
            position: relative;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            height: 100%;
            width: 100%;
        }

        /* SECTION */
        .section {
            background: black;
            padding: 80px 20px;
            text-align: center;
        }

        h1 {
            font-size: 50px;
            letter-spacing: 5px;
        }

        h2 {
            letter-spacing: 3px;
        }
    </style>
</head>

<body>

<div class="hero">
    <div class="overlay">

        <div class="nav">
            <div class="logo">TDFG</div>

            <div class="menu">
                <a href="#">HOME</a>
                <a href="#">VIDEOS</a>
                <a href="#">ALBUM</a>
                <a href="#">ABOUT</a>
            </div>

            <div>
                <a href="https://discord.gg/urvxYYDsNf">Discord</a>
                <a href="https://www.youtube.com/@TrainingDevelopmentFieldGroup">YouTube</a>
                <a href="https://www.instagram.com/tdfg.est23?igsh=MXA3Z3dsenVkeml2NA%3D%3D">Instagram</a>    
            </div>
        </div>

    </div>
</div>

<div class="section">
    <h2>Welcome to TDFG</h2>
    <p>Tactical team focused on realism, coordination, and performance.</p>
</div>

</body>
</html>
